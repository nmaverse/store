<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NMAVERSE — Place Your Order</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --burgundy: #800020;
      --burgundy-light: #a0002a;
      --burgundy-dark: #5a0016;
      --cream: #e8e0c2;
      --cream-muted: #c8bfa0;
      --bg: #0c0c0c;
      --bg2: #141414;
      --bg3: #1c1c1c;
      --border: rgba(232,224,194,0.1);
    }
    body { background: var(--bg); color: var(--cream); font-family: 'Barlow', sans-serif; min-height: 100vh; overflow-x: hidden; }
    .header { background: var(--bg); border-bottom: 1px solid var(--border); padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .logo-mark { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo-circle { width: 40px; height: 40px; border: 2px solid var(--cream); border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--burgundy); }
    .logo-circle span { font-family: 'Anton', sans-serif; font-size: 18px; color: var(--cream); }
    .brand-name { font-family: 'Anton', sans-serif; font-size: 20px; color: var(--cream); letter-spacing: 2px; }
    .order-hero { background: var(--burgundy); padding: 3.5rem 2rem 3rem; text-align: center; position: relative; }
    .order-hero h1 { font-family: 'Anton', sans-serif; font-size: clamp(28px, 6vw, 48px); letter-spacing: 3px; text-transform: uppercase; }
    .form-wrap { max-width: 680px; margin: 0 auto; padding: 3rem 1.5rem; }
    .form-section { margin-bottom: 2.5rem; }
    .section-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--burgundy-light); border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; padding-bottom: 0.5rem; }
    .field { margin-bottom: 1.25rem; }
    label { display: block; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--cream-muted); margin-bottom: 0.5rem; }
    input, textarea, select { width: 100%; background: var(--bg2); border: 1px solid var(--border); color: var(--cream); padding: 0.85rem; outline: none; border-radius: 2px; }
    input:focus, textarea:focus { border-color: var(--burgundy-light); }
    .choice-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px; }
    .choice-item input { display: none; }
    .choice-item label { display: block; padding: 0.7rem; background: var(--bg2); border: 1px solid var(--border); text-align: center; cursor: pointer; }
    .choice-item input:checked + label { background: var(--burgundy-dark); border-color: var(--burgundy); }
    .submit-btn { width: 100%; background: var(--burgundy); color: var(--cream); border: none; font-family: 'Anton', sans-serif; font-size: 18px; padding: 1.1rem; cursor: pointer; letter-spacing: 4px; }
    .success-box { display: none; text-align: center; padding: 4rem 2rem; }
    .invalid { border-color: #a03030 !important; }
    .error-msg { font-size: 11px; color: #e05555; display: none; margin-top: 4px; }
  </style>
</head>
<body>

<header class="header">
  <a href="index.html" class="logo-mark">
    <div class="logo-circle"><span>W</span></div>
    <span class="brand-name">NMAVERSE</span>
  </a>
</header>

<div class="order-hero">
  <h1>Place Your Order</h1>
  <p>Dare to Differ</p>
</div>

<div class="form-wrap">
  <form id="orderForm" novalidate>
    <div class="form-section">
      <div class="section-label">Personal Info</div>
      <div class="field">
        <label>Full Name *</label>
        <input type="text" id="name" required>
        <div class="error-msg" id="err-name">নাম লিখুন</div>
      </div>
      <div class="field">
        <label>Phone Number *</label>
        <input type="tel" id="phone" placeholder="01XXXXXXXXX" required>
        <div class="error-msg" id="err-phone">নম্বর লিখুন</div>
      </div>
      <div class="field">
        <label>Delivery Address *</label>
        <textarea id="address" required></textarea>
        <div class="error-msg" id="err-address">ঠিকানা লিখুন</div>
      </div>
    </div>

    <div class="form-section">
      <div class="section-label">Jersey Details</div>
      <div class="field">
        <label>Team *</label>
        <select id="team" required>
          <option value="">— Select Team —</option>
          <option value="Argentina">Argentina</option>
          <option value="Brazil">Brazil</option>
          <option value="Germany">Germany</option>
        </select>
      </div>
      <div class="field">
        <label>Size *</label>
        <div class="choice-grid">
          <div class="choice-item"><input type="radio" name="size" id="s" value="S"><label for="s">S</label></div>
          <div class="choice-item"><input type="radio" name="size" id="m" value="M"><label for="m">M</label></div>
          <div class="choice-item"><input type="radio" name="size" id="l" value="L"><label for="l">L</label></div>
          <div class="choice-item"><input type="radio" name="size" id="xl" value="XL"><label for="xl">XL</label></div>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="section-label">Payment</div>
      <div class="field">
        <label>Advance Amount *</label>
        <input type="number" id="advance" placeholder="0" required>
      </div>
      <div class="field">
        <label>Transaction ID *</label>
        <input type="text" id="txnid" placeholder="TXN ID" required>
      </div>
    </div>

    <button type="submit" class="submit-btn" id="submitBtn">Confirm Order</button>
  </form>

  <div class="success-box" id="successBox">
    <h2>✓ Order Sent!</h2>
    <p>আপনার অর্ডার টেলিগ্রামে পাঠানো হয়েছে।</p>
    <button onclick="location.reload()" style="background:none; border:1px solid; color:white; padding:10px 20px; cursor:pointer;">আরেকটি অর্ডার দিন</button>
  </div>
</div>

<script>
  const token = '8612024982:AAHm706uMTSlHQbA7kvia0XSFto5Qk8kwgM';
  const chatId = '5378066873';

  document.getElementById('orderForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const btn = document.getElementById('submitBtn');
    btn.innerText = "Sending...";
    btn.disabled = true;

    const name = document.getElementById('name').value;
    const phone = document.getElementById('phone').value;
    const address = document.getElementById('address').value;
    const team = document.getElementById('team').value;
    const size = document.querySelector('input[name="size"]:checked')?.value || 'N/A';
    const advance = document.getElementById('advance').value;
    const txnid = document.getElementById('txnid').value;

    const msg = `🖤 *NEW ORDER*\nName: ${name}\nPhone: ${phone}\nAddress: ${address}\nTeam: ${team}\nSize: ${size}\nAdvance: ${advance}\nTXN: ${txnid}`;

    const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`;

    fetch(url).then(res => {
      if(res.ok) {
        document.getElementById('orderForm').style.display = 'none';
        document.getElementById('successBox').style.display = 'block';
      } else {
        alert("Error! Please start the bot first.");
        btn.disabled = false;
        btn.innerText = "Confirm Order";
      }
    });
  });
</script>
</body>
</html>
